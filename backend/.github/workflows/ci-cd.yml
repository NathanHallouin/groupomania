name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: groupomania_test
          MYSQL_USER: groupomania
          MYSQL_PASSWORD: groupomania
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Create environment file
      run: |
        cat << EOF > .env
        NODE_ENV=test
        PORT=3000
        DB_HOST=127.0.0.1
        DB_PORT=3306
        DB_NAME=groupomania_test
        DB_USERNAME=groupomania
        DB_PASSWORD=groupomania
        JWT_SECRET=test-jwt-secret-key-for-ci-pipeline-testing-purposes-only
        JWT_REFRESH_SECRET=test-refresh-secret-key-for-ci-pipeline-testing-purposes-only
        COOKIE_SECRET=test-cookie-secret-key-for-ci-pipeline-testing-purposes-only
        REDIS_HOST=127.0.0.1
        REDIS_PORT=6379
        LOG_LEVEL=error
        EOF

    - name: Wait for MySQL
      run: |
        until mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent; do
          echo 'Waiting for MySQL...'
          sleep 2
        done

    - name: Setup database
      run: |
        mysql -h127.0.0.1 -P3306 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS groupomania_test;"
        mysql -h127.0.0.1 -P3306 -uroot -proot -e "GRANT ALL PRIVILEGES ON groupomania_test.* TO 'groupomania'@'%';"

    - name: Run database migrations
      run: npm run db:migrate

    - name: Run linting
      run: npm run lint

    - name: Check code formatting
      run: npm run format:check

    - name: Run tests
      run: npm run test:ci

    - name: Run security audit
      run: npm run security:audit

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level=high

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --only=production

    - name: Create deployment artifact
      run: |
        tar -czf deployment.tar.gz \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=tests \
          --exclude=coverage \
          --exclude=.env \
          .

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: deployment-artifact
        path: deployment.tar.gz
        retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: deployment-artifact

    - name: Deploy to production
      run: |
        echo "Deployment step would go here"
        echo "This could include:"
        echo "- Deploying to cloud service (AWS, Azure, GCP)"
        echo "- Updating Docker containers"
        echo "- Running database migrations in production"
        echo "- Updating load balancer configuration"
